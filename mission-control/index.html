<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SKOS Mission Control</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#0b1724;

font-family:Arial,Helvetica,sans-serif;

color:#ffffff;

line-height:1.5;

}

header{

background:#13283b;

padding:25px;

text-align:center;

border-bottom:4px solid #3aa7ff;

}

header h1{

font-size:40px;

margin-bottom:10px;

}

header p{

color:#9ec3df;

font-size:18px;

}

.container{

width:95%;

max-width:1500px;

margin:auto;

padding-bottom:40px;

}

.section{

background:#16293d;

margin-top:25px;

padding:22px;

border-radius:10px;

box-shadow:0 3px 10px rgba(0,0,0,.35);

}

.section h2{

color:#55c8ff;

margin-bottom:20px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:18px;

}

.card{

background:#1d3954;

padding:18px;

border-radius:8px;

text-align:center;

transition:.25s;

}

.card:hover{

transform:translateY(-3px);

background:#214364;

}

.card h3{

margin-bottom:12px;

color:#7fdcff;

font-size:18px;

}

.card p{

font-size:28px;

font-weight:bold;

color:#ffffff;

}

.module-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:20px;

margin-top:20px;

}

.module-card{

display:block;

background:#1d3954;

padding:22px;

border-radius:8px;

text-decoration:none;

color:white;

transition:.25s;

}

.module-card:hover{

background:#214364;

transform:translateY(-3px);

}

.module-card h3{

color:#7fdcff;

margin-bottom:12px;

}

.module-card p{

color:#d8e9f7;

font-size:15px;

}

.quick-links ul{

list-style:none;

}

.quick-links li{

margin-bottom:10px;

}

.quick-links a{

color:#7fdcff;

text-decoration:none;

}

.quick-links a:hover{

text-decoration:underline;

}

footer{

margin-top:40px;

padding:25px;

text-align:center;

background:#13283b;

color:#9fb8cf;

border-top:4px solid #3aa7ff;

}

.status-active{

color:#4cff72;

font-weight:bold;

}

.status-online{

color:#4cff72;

font-weight:bold;

}

@media(max-width:768px){

header h1{

font-size:30px;

}

.grid{

grid-template-columns:1fr;

}

.module-grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<h1>SKOS Mission Control</h1>

<p>

Smaily Knowledge Operating System

</p>

</header>

<div class="container">

<div class="section">

<h2>Executive Dashboard</h2>

<div class="grid">

<div class="card">

<h3>Total Builds</h3>

<p id="buildCount">

Loading...

</p>

</div>

<div class="card">

<h3>Latest Build</h3>

<p id="latestBuild">

Loading...

</p>

</div>

<div class="card">

<h3>Project Status</h3>

<p class="status-active"

id="projectStatus">

ACTIVE

</p>

</div>

<div class="card">

<h3>Current Version</h3>

<p id="projectVersion">

Alpha 0.1

</p>

</div>

<div class="card">

<h3>Architecture</h3>

<p>

Foundation

</p>

</div>

<div class="card">

<h3>Mission</h3>

<p class="status-online">

ONLINE

</p>

</div>

</div>

</div>
